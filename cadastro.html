<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="cd.css">
</head>

<body>

    <div class="seta">
        <dl>
            <dd><a href="index.html"><i class="fa-solid fa-arrow-left" style="color: rgb(0, 0, 0);"></i></a></dd>
        </dl>
    </div>
    
    <div class="container">
        <dl>
            <dd class="icon"><a href=""><i class="fa-brands fa-gg-circle" style="color: rgb(69, 143, 249);"></i></a>
            </dd>
        </dl>
        <h1 class="title">Faça o seu cadastro aqui</h1>
    </div>

    <div class="corpo">
        <div class="container-4">
            <label for="" class="lab">Nome</label>
            <input type="text" class="nome">
        </div>

        <div class="container-1">
            <label for="" class="lb">Email</label>
            <input type="password" class="inp">
        </div>

        <div class="container-2">
            <label for="" class="lb-1">Senha</label>
            <input type="email" class="senha">
        </div>

        <div class="container-5">
            <label for="" class="lb-2">Confirmar senha</label>
            <input type="password" class="senha-1">
        </div>

        <div class="f1">
            <input type="submit" class="but" value="Criar conta">
        </div>

        <div class="lembrar">
            <input type="checkbox" class="check">
            <label for="check" class="text">Lembrar sempre</label>
        </div>

        <div class="forgot-pass">
            <a href="" class="link">Esqueceu sua senha?</a>
        </div>

        <div class="container-3">
            <p class="texto">Tente com</p>
            <div class=" barra">
                <img src="images/Line 3.png" alt="" class="stick">
                <img src="images/Line 3.png" alt="" class="dick">
            </div>
        </div>

        <div id="contas">
            <dl>
                <dd class="icons"><a href=""><i class="fa-brands fa-google" style="color: rgb(69, 143, 249);"></i></a>
                </dd>
                <dd class="icons-1"><a href=""></a><i class="fa-brands fa-github" style="color: rgb(69, 143, 249);"></i>
                </dd>
            </dl>
            <a href="#" class="google">Google</a>
            <a href="#" class="git">GitHub</a>
        </div>

        <div class="duvidas">
            <p class="duvida">Já possui conta?</p>
            <a href="" class="login">Logue na sua conta aqui</a>
        </div>
    </div>

    <div class="borda">

    </div>

</body>

</html>
